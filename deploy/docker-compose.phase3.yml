name: acquittify-peregrine-phase3

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-trialai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trialai}
      POSTGRES_DB: ${POSTGRES_DB:-trialai}
    ports:
      - "${POSTGRES_PORT:-56432}:5432"
    volumes:
      - phase3_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 30

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-56379}:6379"
    volumes:
      - phase3_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 30

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin_password_change_me}
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_API_PORT:-59000}:9000"
      - "${MINIO_CONSOLE_PORT:-59001}:9001"
    volumes:
      - phase3_minio_data:/data

  minio_init:
    image: minio/mc:latest
    depends_on:
      - minio
    restart: "no"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin_password_change_me}
      MINIO_BUCKET: ${MINIO_BUCKET:-trialai-artifacts}
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 \"$$MINIO_ROOT_USER\" \"$$MINIO_ROOT_PASSWORD\" 2>/dev/null; do
        sleep 2;
      done;
      mc mb -p local/$$MINIO_BUCKET 2>/dev/null || true;
      mc anonymous set none local/$$MINIO_BUCKET 2>/dev/null || true;
      "

  migrate:
    build:
      context: ../backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://trialai:trialai@postgres:5432/trialai}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-http://minio:9000}
      S3_INTERNAL_ENDPOINT_URL: ${S3_INTERNAL_ENDPOINT_URL:-http://minio:9000}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-minioadmin}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-minioadmin_password_change_me}
      MINIO_BUCKET: ${MINIO_BUCKET:-trialai-artifacts}
      AUTH_SECRET_KEY: ${AUTH_SECRET_KEY:-phase3-local-secret}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-false}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-http://localhost:53000}
    command: ["alembic", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started

  api:
    build:
      context: ../backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://trialai:trialai@postgres:5432/trialai}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-http://minio:9000}
      S3_INTERNAL_ENDPOINT_URL: ${S3_INTERNAL_ENDPOINT_URL:-http://minio:9000}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-minioadmin}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-minioadmin_password_change_me}
      MINIO_BUCKET: ${MINIO_BUCKET:-trialai-artifacts}
      AUTH_SECRET_KEY: ${AUTH_SECRET_KEY:-phase3-local-secret}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-false}
      AUTH_PASSWORD_RESET_DEV_RETURN_TOKEN: ${AUTH_PASSWORD_RESET_DEV_RETURN_TOKEN:-true}
      AUTH_RATE_LIMIT_ENABLED: ${AUTH_RATE_LIMIT_ENABLED:-true}
      AUTH_RATE_LIMIT_BACKEND: ${AUTH_RATE_LIMIT_BACKEND:-redis}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-http://localhost:53000}
    command:
      [
        "sh",
        "-c",
        "uvicorn app.main:app --host 0.0.0.0 --port 8002 --workers ${UVICORN_WORKERS:-2}",
      ]
    ports:
      - "${API_PORT:-58002}:8002"
    depends_on:
      migrate:
        condition: service_completed_successfully

  worker:
    build:
      context: ../backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://trialai:trialai@postgres:5432/trialai}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-http://minio:9000}
      S3_INTERNAL_ENDPOINT_URL: ${S3_INTERNAL_ENDPOINT_URL:-http://minio:9000}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-minioadmin}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-minioadmin_password_change_me}
      MINIO_BUCKET: ${MINIO_BUCKET:-trialai-artifacts}
      AUTH_SECRET_KEY: ${AUTH_SECRET_KEY:-phase3-local-secret}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-false}
      AUTH_PASSWORD_RESET_DEV_RETURN_TOKEN: ${AUTH_PASSWORD_RESET_DEV_RETURN_TOKEN:-true}
    command:
      [
        "sh",
        "-c",
        "celery -A app.workers.celery_app.celery_app worker --loglevel=${CELERY_LOG_LEVEL:-info} --concurrency=${CELERY_CONCURRENCY:-2}",
      ]
    depends_on:
      migrate:
        condition: service_completed_successfully

  frontend:
    build:
      context: ../frontend
      args:
        NEXT_PUBLIC_PEREGRINE_API_URL: ${NEXT_PUBLIC_PEREGRINE_API_URL:-http://localhost:58002}
        NEXT_PUBLIC_PEREGRINE_CSRF_COOKIE_NAME: ${NEXT_PUBLIC_PEREGRINE_CSRF_COOKIE_NAME:-peregrine_csrf}
        NEXT_PUBLIC_PEREGRINE_CSRF_HEADER_NAME: ${NEXT_PUBLIC_PEREGRINE_CSRF_HEADER_NAME:-X-CSRF-Token}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-53000}:3000"
    depends_on:
      api:
        condition: service_started

volumes:
  phase3_postgres_data:
  phase3_redis_data:
  phase3_minio_data:
